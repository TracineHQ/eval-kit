name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js:
    name: JS tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --test js/test/stats.test.mjs

  python:
    name: Python tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package
        working-directory: python
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: python
        run: pytest

  cross-validation:
    name: Cross-validation (Node ${{ matrix.node }} + Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: [js, python]
    strategy:
      matrix:
        node: ['20']
        python: ['3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Python package
        working-directory: python
        run: pip install -e ".[dev]"
      - name: Run cross-validation
        working-directory: python
        run: pytest ../tests/cross-validation/ -v
